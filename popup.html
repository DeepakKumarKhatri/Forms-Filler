<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Filler</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">

    <!-- ═══ MAIN SCREEN ═══ -->
    <div id="screen-main">
      <header class="topbar">
        <h1 class="topbar-title">Form Filler</h1>
        <button id="settings-btn" class="icon-btn" title="Settings">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </header>

      <!-- Project -->
      <section class="section">
        <label class="label">Project</label>
        <div class="dropdown" id="project-dropdown">
          <button class="dd-trigger" type="button">
            <span class="dd-text">No project</span>
            <svg class="dd-arrow" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="dd-menu"></div>
        </div>
      </section>

      <!-- Accounts -->
      <section class="section">
        <div class="label-row">
          <label class="label">Accounts</label>
          <span id="profile-count" class="pill-count">0</span>
        </div>
        <div class="account-controls">
          <div class="dropdown flex-1" id="profile-dropdown">
            <button class="dd-trigger" type="button">
              <span class="dd-text">default</span>
              <svg class="dd-arrow" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="dd-menu"></div>
          </div>
          <div class="icon-group">
            <button id="add-profile-btn" class="icon-btn sm" title="New account">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button id="rename-profile-btn" class="icon-btn sm" title="Rename account">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
            </button>
            <button id="delete-profile-btn" class="icon-btn sm danger-icon" title="Delete account">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </div>
        <div id="account-badges" class="badges"></div>
      </section>

      <!-- Scan -->
      <section class="section">
        <button id="scan-btn" class="btn primary full">Find Fields</button>
      </section>

      <!-- Fields -->
      <section id="fields-section" class="section hidden">
        <div class="label-row">
          <label class="label">Fields</label>
          <span id="field-count" class="pill-count">0</span>
        </div>
        <div id="fields-container" class="fields-list"></div>
      </section>

      <!-- Actions -->
      <section id="actions-section" class="section hidden">
        <div class="btn-pair">
          <button id="fill-btn" class="btn accent">Fill Form</button>
          <button id="save-btn" class="btn primary">Save</button>
        </div>
      </section>
    </div>

    <!-- ═══ SETTINGS SCREEN ═══ -->
    <div id="screen-settings" class="hidden">
      <header class="topbar">
        <button id="back-btn" class="icon-btn" title="Back">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <h1 class="topbar-title">Settings</h1>
        <span style="width:36px"></span>
      </header>

      <section class="section">
        <label class="label">Data</label>
        <div class="btn-pair">
          <button id="export-btn" class="btn outline">Export</button>
          <button id="import-btn" class="btn outline">Import</button>
          <input type="file" id="import-input" accept=".json" hidden>
        </div>
      </section>

      <section class="section">
        <label class="label">Danger Zone</label>
        <div class="danger-stack">
          <button id="clear-project-btn" class="btn danger full">Clear This Project</button>
          <button id="clear-all-btn" class="btn danger full">Clear All Data</button>
        </div>
      </section>
    </div>

    <!-- ═══ MODAL ═══ -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal-card">
        <h3 id="modal-title" class="modal-title"></h3>
        <p id="modal-message" class="modal-message"></p>
        <input id="modal-input" class="modal-input" type="text" autocomplete="off" spellcheck="false">
        <div class="modal-btns">
          <button id="modal-cancel" class="btn ghost">Cancel</button>
          <button id="modal-confirm" class="btn primary">Confirm</button>
        </div>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
